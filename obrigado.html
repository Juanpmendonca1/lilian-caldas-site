<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado — Lílian Caldas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: #1A1210;
      background: #FDFAF5;
      line-height: 1.65;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .thank-you-section {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 16px;
      text-align: center;
    }
    .thank-you-content {
      max-width: 500px;
    }
    .thank-you-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      background: #7A3F52;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn .6s ease-out;
    }
    .thank-you-icon::after {
      content: '✓';
      color: white;
      font-size: 48px;
      font-weight: 700;
    }
    h1 {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 800;
      color: #1A1210;
      margin-bottom: 24px;
      line-height: 1.2;
    }
    p {
      font-size: clamp(16px, 4vw, 18px);
      color: #4A3830;
      margin-bottom: 40px;
      line-height: 1.8;
    }
    .btn-back {
      display: inline-block;
      padding: 14px 32px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 100px;
      font-weight: 600;
      font-size: 16px;
      transition: all .3s ease;
    }
    .btn-back:hover {
      background: #1DAE55;
      transform: translateY(-2px);
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 600px) {
      .thank-you-section {
        min-height: 100vh;
        padding: 24px 16px;
      }
      h1 {
        font-size: 28px;
      }
      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P8PL4WZN"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<section class="thank-you-section">
  <div class="thank-you-content">
    <div class="thank-you-icon"></div>
    <h1>Obrigado por dar o primeiro passo.</h1>
    <p>A Doutora Lílian irá te mandar uma mensagem no WhatsApp em até 24h.</p>
    <a href="/" class="btn-back">Voltar ao site</a>
  </div>
</section>

</body>
</html>
